<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Keyboard Key Animation Preview</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2e2e3e;
      --text: #e0e0f0;
      --muted: #6b6b8a;
      --accent: #7c6aff;
      --accent2: #ff6ab0;
      --accent3: #6affb4;
      /* key width: 10 keys + 9 gaps of 3px, 8px side padding each side */
      --key-gap: 3px;
      --key-w: calc((100vw - 16px - 9 * var(--key-gap)) / 10);
      --key-h: calc(var(--key-w) * 1.38);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollable top area ── */
    .top-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 12px 10px;
    }

    h1 {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* ── Compact style cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:active { background: #1f1f2e; }

    .card.active {
      border-color: var(--accent);
      background: #201e3a;
      box-shadow: 0 0 0 1px var(--accent), 0 0 10px 2px rgba(124,106,255,.2);
    }

    .card-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-align: center;
      line-height: 1;
    }

    .card.active .card-label { color: var(--accent); }

    /* ── Preview key ── */
    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: default;
      user-select: none;
      position: relative;
      background: #23233a;
      color: #c8c8e8;
      border: 2px solid #3a3a55;
      box-shadow: 0 3px 0 #13132a, 0 5px 10px rgba(0,0,0,0.5);
    }

    /* ── Animations ── */
    @keyframes press {
      0%   { transform: translateY(0);   box-shadow: 0 1px 0 1px #0a0a12; }
      40%  { transform: translateY(2px); box-shadow: 0 0px 0 1px #0a0a12; }
      100% { transform: translateY(0);   box-shadow: 0 1px 0 1px #0a0a12; }
    }
    .anim-press { animation: press 0.9s ease-in-out infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scaleY(1); }
      30%       { transform: translateY(-10px) scaleY(1.05); }
      55%       { transform: translateY(3px) scaleY(0.94); }
      70%       { transform: translateY(-4px) scaleY(1.02); }
      85%       { transform: translateY(1px) scaleY(0.98); }
    }
    .anim-bounce { animation: bounce 1.4s cubic-bezier(.36,.07,.19,.97) infinite; }

    @keyframes glow {
      0%, 100% { box-shadow: 0 1px 0 1px #0a0a12, 0 0 6px 2px rgba(124,106,255,0.2); }
      50%       { box-shadow: 0 1px 0 1px #0a0a12, 0 0 18px 6px rgba(124,106,255,0.7), 0 0 36px 12px rgba(124,106,255,0.25); }
    }
    .anim-glow { border-color: var(--accent); animation: glow 1.6s ease-in-out infinite; }

    @keyframes rgb {
      0%   { border-color: #ff4444; box-shadow: 0 1px 0 1px #0a0a12, 0 0 10px 3px rgba(255,68,68,.6);   color: #ff8888; }
      25%  { border-color: #ffcc00; box-shadow: 0 1px 0 1px #0a0a12, 0 0 10px 3px rgba(255,204,0,.6);   color: #ffe066; }
      50%  { border-color: #44ff88; box-shadow: 0 1px 0 1px #0a0a12, 0 0 10px 3px rgba(68,255,136,.6);  color: #88ffbb; }
      75%  { border-color: #44aaff; box-shadow: 0 1px 0 1px #0a0a12, 0 0 10px 3px rgba(68,170,255,.6);  color: #88ccff; }
      100% { border-color: #ff44aa; box-shadow: 0 1px 0 1px #0a0a12, 0 0 10px 3px rgba(255,68,170,.6);  color: #ff88cc; }
    }
    .anim-rgb { animation: rgb 2.4s linear infinite; }

    @keyframes wobble {
      0%,100% { transform: rotate(0deg); }
      15%     { transform: rotate(-8deg); }
      30%     { transform: rotate(7deg); }
      45%     { transform: rotate(-5deg); }
      60%     { transform: rotate(4deg); }
      75%     { transform: rotate(-2deg); }
    }
    .anim-wobble { animation: wobble 1.2s ease-in-out infinite; }

    @keyframes flip {
      0%,100% { transform: rotateY(0deg); }
      40%     { transform: rotateY(180deg); }
      60%     { transform: rotateY(180deg); }
    }
    .anim-flip { animation: flip 2s ease-in-out infinite; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-4px); }
      40%     { transform: translateX(4px); }
      60%     { transform: translateX(-3px); }
      80%     { transform: translateX(3px); }
    }
    .anim-shake { animation: shake 0.7s ease-in-out infinite; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }
    .anim-float { animation: float 2s ease-in-out infinite; box-shadow: 0 4px 0 1px #0a0a12, 0 6px 16px rgba(0,0,0,.5); }

    @keyframes ripple-ring {
      0%   { opacity: 0.8; transform: scale(0.6); }
      100% { opacity: 0;   transform: scale(2.2); }
    }
    .anim-ripple::before, .anim-ripple::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 2px solid var(--accent2);
      pointer-events: none;
      animation: ripple-ring 0.65s ease-out infinite;
    }
    .anim-ripple { border-color: var(--accent2); }
    .anim-ripple::after { animation-delay: 0.325s; }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% {
        box-shadow: 0 1px 0 1px #0a0a12, 0 0 8px 2px rgba(106,255,180,.7), 0 0 20px 6px rgba(106,255,180,.3);
        border-color: var(--accent3); color: var(--accent3);
      }
      20%,24%,55% { box-shadow: 0 1px 0 1px #0a0a12; border-color: transparent; color: #c8c8e8; }
    }
    .anim-flicker { animation: flicker 3s linear infinite; }

    @keyframes pop {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.22); }
    }
    .anim-pop { animation: pop 0.8s cubic-bezier(.36,.07,.19,.97) infinite; }

    .key-type { font-family: monospace; }
    .key-type .l1 { animation: fadecycle1 3s steps(1) infinite; position: absolute; }
    .key-type .l2 { animation: fadecycle2 3s steps(1) infinite; position: absolute; }
    .key-type .l3 { animation: fadecycle3 3s steps(1) infinite; position: absolute; }
    @keyframes fadecycle1 { 0%,30%{opacity:1} 34%,100%{opacity:0} }
    @keyframes fadecycle2 { 0%,33%{opacity:0} 34%,63%{opacity:1} 67%,100%{opacity:0} }
    @keyframes fadecycle3 { 0%,66%{opacity:0} 67%,96%{opacity:1} 100%{opacity:0} }

    /* ── Bottom keyboard panel (pinned) ── */
    .keyboard-panel {
      flex-shrink: 0;
      background: #151519;
      border-top: 1px solid #0a0a0e;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    }

    /* Controls row: toggles + slider */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toggle-label.dimmed { opacity: 0.35; pointer-events: none; }

    .toggle-track {
      width: 28px; height: 16px;
      border-radius: 999px;
      background: var(--border);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle-track.on .toggle-thumb { transform: translateX(12px); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      min-width: 120px;
    }
    .slider-row label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      white-space: nowrap;
    }
    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 5px 2px rgba(124,106,255,.4);
    }
    .slider-row input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
    }
    .slider-val {
      font-size: 0.65rem;
      color: var(--accent);
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Style pills — horizontal scroll */
    .style-picker {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: 8px;
      padding-bottom: 2px;
    }
    .style-picker::-webkit-scrollbar { display: none; }

    .style-pill {
      flex-shrink: 0;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      min-height: 30px;
      display: flex;
      align-items: center;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .style-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,255,0.12);
    }
    .style-pill.none-pill.active {
      border-color: var(--muted);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    /* Keyboard rows */
    .kb-rows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--key-gap);
      width: 100%;
    }
    .kb-row {
      display: flex;
      gap: var(--key-gap);
      justify-content: center;
    }
    /* Space row fills full width */
    .kb-row:last-child { width: calc(10 * var(--key-w) + 9 * var(--key-gap)); }

    .ikey {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--key-w);
      height: var(--key-h);
      flex-shrink: 0;
      padding: 0;
      border-radius: 7px;
      font-size: calc(var(--key-w) * 0.62);
      font-weight: 500;
      letter-spacing: 0;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: visible;
      z-index: 1;
      background: #2c2c3a;
      color: #e0e0f0;
      border: 2px solid transparent;
      box-shadow: 0 1px 0 1px #0a0a12;
      transition: transform 0.06s, box-shadow 0.06s, background 0.06s;
      touch-action: manipulation;
    }

    /* Row 2 (9 keys) and Row 3 (7 keys) are slightly wider per key */
    .ikey.space-key {
      flex: 1;
      width: auto;
      font-size: calc(var(--key-w) * 0.3);
      color: var(--muted);
    }

    .ikey.anim-ripple { z-index: 0; }

    .ikey.pressed {
      transform: translateY(1px) !important;
      box-shadow: 0 0 0 1px #0a0a12 !important;
      background: #3a3a4e !important;
    }

    @keyframes key-flash {
      0%   { background: #3a3a4e; box-shadow: 0 1px 0 1px #0a0a12, 0 0 12px 3px rgba(124,106,255,.5); }
      100% { background: #2c2c3a; box-shadow: 0 1px 0 1px #0a0a12; }
    }
    .ikey.flash { animation: key-flash 0.5s ease-out forwards !important; }

    /* ── Post-ikey cascade fixes ──
       These animation classes are defined before .ikey so .ikey's border/shadow wins.
       Re-declare them here so they take effect on interactive keys. ── */
    .ikey.anim-glow   { border-color: var(--accent); }
    .ikey.anim-ripple { border-color: var(--accent2); }
    .ikey.anim-float  { box-shadow: 0 4px 0 1px #0a0a12, 0 6px 16px rgba(0,0,0,.5); }

    /* ── Tablet (600px+) ── */
    @media (min-width: 600px) {
      :root {
        --key-gap: 4px;
        --key-w: min(calc((100vw - 40px - 9 * var(--key-gap)) / 10), 48px);
        --key-h: calc(var(--key-w) * 1.35);
      }
      .top-area { padding: 18px 20px 12px; }
      h1 { font-size: 1.2rem; }
      .grid { grid-template-columns: repeat(6, 1fr); gap: 8px; }
      .key { width: 40px; height: 40px; font-size: 0.95rem; }
      .card-label { font-size: 0.62rem; }
      .keyboard-panel { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
      .ikey { border-radius: 8px; }
    }

    /* ── Desktop (960px+) ── */
    @media (min-width: 960px) {
      :root { --key-w: 46px; --key-h: 52px; --key-gap: 5px; }
      body { max-width: 520px; margin: 0 auto; }
      .top-area { padding: 20px 20px 10px; }
      h1 { font-size: 1.3rem; }
      .grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
      .key { width: 44px; height: 44px; font-size: 1rem; }
      .card { border-radius: 12px; padding: 10px 6px 8px; }
      .card:hover { border-color: var(--accent); background: #1f1f2e; }
      .keyboard-panel { border-radius: 16px 16px 0 0; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
      .ikey { border-radius: 9px; }
      .style-pill:hover { border-color: var(--accent); color: var(--text); }
    }
  </style>
</head>
<body>

  <!-- Scrollable top: style cards -->
  <div class="top-area">
    <h1>Key Animations</h1>
    <div class="grid" id="cardGrid">
      <div class="card" data-anim="anim-press">
        <div class="key anim-press">A</div>
        <span class="card-label">Press</span>
      </div>
      <div class="card" data-anim="anim-bounce">
        <div class="key anim-bounce">B</div>
        <span class="card-label">Bounce</span>
      </div>
      <div class="card" data-anim="anim-glow">
        <div class="key anim-glow">G</div>
        <span class="card-label">Glow</span>
      </div>
      <div class="card" data-anim="anim-rgb">
        <div class="key anim-rgb">R</div>
        <span class="card-label">RGB</span>
      </div>
      <div class="card" data-anim="anim-wobble">
        <div class="key anim-wobble">W</div>
        <span class="card-label">Wobble</span>
      </div>
      <div class="card" data-anim="anim-flip">
        <div class="key anim-flip">F</div>
        <span class="card-label">Flip</span>
      </div>
      <div class="card" data-anim="anim-shake">
        <div class="key anim-shake">!</div>
        <span class="card-label">Shake</span>
      </div>
      <div class="card" data-anim="anim-float">
        <div class="key anim-float">↑</div>
        <span class="card-label">Float</span>
      </div>
      <div class="card" data-anim="anim-ripple">
        <div class="key anim-ripple" style="border-color:var(--accent2)">◎</div>
        <span class="card-label">Ripple</span>
      </div>
      <div class="card" data-anim="anim-flicker">
        <div class="key anim-flicker">N</div>
        <span class="card-label">Flicker</span>
      </div>
      <div class="card" data-anim="anim-pop">
        <div class="key anim-pop">★</div>
        <span class="card-label">Pop</span>
      </div>
    </div>
  </div>

  <!-- Pinned bottom: keyboard -->
  <div class="keyboard-panel">

    <div class="controls">
      <label class="toggle-label" id="onPressToggle">
        <div class="toggle-track on" id="onPressTrack"><div class="toggle-thumb"></div></div>
        On press
      </label>
      <label class="toggle-label dimmed" id="staggerToggle">
        <div class="toggle-track on" id="staggerTrack"><div class="toggle-thumb"></div></div>
        Stagger
      </label>
      <div class="slider-row">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="25" max="300" value="100" step="5">
        <span class="slider-val" id="speedVal">1×</span>
      </div>
    </div>

    <div class="style-picker" id="stylePicker"></div>
    <div class="kb-rows" id="kbRows"></div>

  </div>

  <script>
    const STYLES = [
      { id: 'none',         label: 'None' },
      { id: 'anim-press',   label: 'Press' },
      { id: 'anim-bounce',  label: 'Bounce' },
      { id: 'anim-glow',    label: 'Glow' },
      { id: 'anim-rgb',     label: 'RGB' },
      { id: 'anim-wobble',  label: 'Wobble' },
      { id: 'anim-flip',    label: 'Flip' },
      { id: 'anim-shake',   label: 'Shake' },
      { id: 'anim-float',   label: 'Float' },
      { id: 'anim-ripple',  label: 'Ripple' },
      { id: 'anim-flicker', label: 'Flicker' },
      { id: 'anim-pop',     label: 'Pop' },
    ];

    const ALL_ANIM_CLASSES = STYLES.filter(s => s.id !== 'none').map(s => s.id);

    const ROWS = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Z','X','C','V','B','N','M'],
      ['Space'],
    ];

    const BASE_DUR = {
      'anim-press':0.9,'anim-bounce':1.4,'anim-glow':1.6,'anim-rgb':2.4,
      'anim-wobble':1.2,'anim-flip':2.0,'anim-shake':0.7,'anim-float':2.0,
      'anim-ripple':0.65,'anim-flicker':3.0,'anim-pop':0.8,
    };

    let currentStyle   = 'none';
    let staggerEnabled = true;
    let onPressOnly    = true;
    let speedMult      = 1;
    const pendingStop  = new WeakMap();

    // ── Pills ──
    const picker = document.getElementById('stylePicker');
    STYLES.forEach(s => {
      const pill = document.createElement('button');
      pill.className = 'style-pill' + (s.id === 'none' ? ' none-pill active' : '');
      pill.textContent = s.label;
      pill.dataset.style = s.id;
      pill.addEventListener('click', () => selectStyle(s.id));
      picker.appendChild(pill);
    });

    // ── Keyboard ──
    const kbRows = document.getElementById('kbRows');
    let keyIndex = 0;
    ROWS.forEach((row, rowIdx) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      row.forEach(k => {
        const el = document.createElement('button');
        el.className = 'ikey' + (k === 'Space' ? ' space-key' : '');
        el.textContent = k === 'Space' ? '⎵' : k.toLowerCase();
        el.dataset.key = k;
        el.dataset.index = keyIndex++;
        el.addEventListener('mousedown', () => onKeyDown(el));
        el.addEventListener('mouseup',   () => onKeyUp(el));
        el.addEventListener('mouseleave',() => onKeyUp(el));
        el.addEventListener('touchstart', e => { e.preventDefault(); onKeyDown(el); }, { passive: false });
        el.addEventListener('touchend',   e => { e.preventDefault(); onKeyUp(el); },   { passive: false });
        el.addEventListener('touchcancel',() => onKeyUp(el));
        rowEl.appendChild(el);
      });
      kbRows.appendChild(rowEl);
    });

    // ── Helpers ──
    function setKeyAnimStyle(el, animClass, staggerIdx) {
      el.style.animationDuration = '';
      el.style.animationDelay    = '';
      if (!animClass || animClass === 'none') return;
      el.style.animationDuration = ((BASE_DUR[animClass] ?? 1) / speedMult).toFixed(3) + 's';
      if (staggerIdx != null && staggerEnabled)
        el.style.animationDelay = (staggerIdx * 0.06 / speedMult).toFixed(3) + 's';
    }

    function applyStyleToKeys() {
      document.querySelectorAll('.ikey').forEach(el => {
        ALL_ANIM_CLASSES.forEach(c => el.classList.remove(c));
        el.style.animationDuration = '';
        el.style.animationDelay    = '';
        if (onPressOnly || currentStyle === 'none') return;
        el.classList.add(currentStyle);
        setKeyAnimStyle(el, currentStyle, parseInt(el.dataset.index));
      });
    }

    function selectStyle(styleId) {
      currentStyle = styleId;
      picker.querySelectorAll('.style-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.style === styleId));
      document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('active', c.dataset.anim === styleId));
      applyStyleToKeys();
    }

    function onKeyDown(el) {
      if (onPressOnly && currentStyle !== 'none') {
        if (pendingStop.has(el)) {
          el.removeEventListener('animationiteration', pendingStop.get(el));
          pendingStop.delete(el);
        }
        ALL_ANIM_CLASSES.forEach(c => el.classList.remove(c));
        void el.offsetWidth;
        el.classList.add(currentStyle);
        setKeyAnimStyle(el, currentStyle, null);
      } else {
        el.classList.add('pressed');
        if (currentStyle === 'none') {
          el.classList.remove('flash');
          void el.offsetWidth;
          el.classList.add('flash');
          el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
        }
      }
    }

    function onKeyUp(el) {
      el.classList.remove('pressed');
      if (onPressOnly && currentStyle !== 'none') {
        const handler = () => {
          ALL_ANIM_CLASSES.forEach(c => el.classList.remove(c));
          el.style.animationDuration = '';
          el.style.animationDelay    = '';
          pendingStop.delete(el);
        };
        pendingStop.set(el, handler);
        el.addEventListener('animationiteration', handler, { once: true });
      }
    }

    // ── Toggles ──
    const onPressTrack  = document.getElementById('onPressTrack');
    const staggerToggle = document.getElementById('staggerToggle');
    document.getElementById('onPressToggle').addEventListener('click', () => {
      onPressOnly = !onPressOnly;
      onPressTrack.classList.toggle('on', onPressOnly);
      staggerToggle.classList.toggle('dimmed', onPressOnly);
      applyStyleToKeys();
    });

    const staggerTrack = document.getElementById('staggerTrack');
    document.getElementById('staggerToggle').addEventListener('click', () => {
      staggerEnabled = !staggerEnabled;
      staggerTrack.classList.toggle('on', staggerEnabled);
      applyStyleToKeys();
    });

    // ── Speed slider ──
    const speedSlider = document.getElementById('speedSlider');
    const speedVal    = document.getElementById('speedVal');
    function fmtMult(m) { return m.toFixed(2).replace(/\.?0+$/, '') + '×'; }
    speedSlider.addEventListener('input', () => {
      speedMult = speedSlider.value / 100;
      speedVal.textContent = fmtMult(speedMult);
      applyStyleToKeys();
    });

    // ── Cards ──
    document.getElementById('cardGrid').querySelectorAll('.card').forEach(card =>
      card.addEventListener('click', () => selectStyle(card.dataset.anim)));

    // ── Physical keyboard ──
    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      const k = e.key === ' ' ? 'Space' : e.key.toUpperCase();
      const el = kbRows.querySelector(`[data-key="${k}"]`);
      if (el) onKeyDown(el);
    });
    document.addEventListener('keyup', e => {
      const k = e.key === ' ' ? 'Space' : e.key.toUpperCase();
      const el = kbRows.querySelector(`[data-key="${k}"]`);
      if (el) onKeyUp(el);
    });
  </script>

</body>
</html>
